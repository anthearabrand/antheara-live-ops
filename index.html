<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Antheara Live Ops — ระบบจัดการทีมไลฟ์</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@500;600;700&family=Anuphan:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#faf7f3;
    --card:#ffffff;
    --text:#241d19;
    --text-sub:#8a7d72;
    --accent:#44271F;
    --accent-hover:#5c392e;
    --accent-soft:#F5EEE5;
    --border:#ece3d8;
    --success:#16a34a;
    --warn:#b8791f;
    --danger:#b9432f;
    --tiktok:#000000;
    --shopee:#ee4d2d;
    --shadow-sm:0 1px 2px rgba(68,39,31,.05);
    --shadow-md:0 6px 24px rgba(68,39,31,.07);
    --shadow-lg:0 24px 60px rgba(68,39,31,.18);
    --ink:#2b1810;
    --ink-deep:#241209;
    --cream:#f0e6d8;
    --cream-dim:#c9b8a2;
    --gold:#b08d5f;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Anuphan","Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.55;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,.display{font-family:"Bai Jamjuree","Anuphan",sans-serif;letter-spacing:.005em;}
  h3{font-size:16.5px;font-weight:600;}
  .brand-serif{font-family:"Playfair Display",serif;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  ::selection{background:var(--accent-soft);color:var(--accent);}

  /* ===== LOGIN ===== */
  #login-screen{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(ellipse 900px 600px at 15% 10%, rgba(255,255,255,.05), transparent 60%),
      linear-gradient(165deg,var(--ink) 0%,var(--ink-deep) 100%);
    padding:24px;
  }
  .login-card{
    background:var(--card);border-radius:22px;padding:48px 42px;width:100%;max-width:380px;
    box-shadow:var(--shadow-lg);text-align:center;border:1px solid rgba(255,255,255,.4);
  }
  .login-card .brand{font-family:"Playfair Display",serif;font-size:38px;font-weight:600;font-style:italic;color:var(--ink);margin-bottom:2px;letter-spacing:.01em;}
  .login-card .sub{color:var(--text-sub);font-size:12.5px;margin-bottom:32px;letter-spacing:.12em;text-transform:uppercase;}
  .login-card input{
    width:100%;padding:15px 16px;border:1.5px solid var(--border);border-radius:12px;
    font-size:22px;text-align:center;letter-spacing:.35em;margin-bottom:16px;
    transition:border-color .15s,box-shadow .15s;
  }
  .login-card input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .login-card button{
    width:100%;padding:14px;border:none;border-radius:12px;background:var(--accent);
    color:#fff;font-size:15px;font-weight:600;transition:background .15s,transform .1s;
    letter-spacing:.02em;
  }
  .login-card button:hover{background:var(--accent-hover);}
  .login-card button:active{transform:scale(.98);}
  .login-error{color:var(--danger);font-size:13px;margin-top:12px;min-height:18px;}
  .login-hint{margin-top:24px;font-size:12px;color:var(--text-sub);background:var(--accent-soft);border-radius:10px;padding:12px 14px;text-align:left;line-height:1.8;}

  /* ===== APP SHELL ===== */
  #app-shell{display:none;min-height:100vh;}
  #app-shell.active{display:flex;}
  .sidebar{
    width:240px;flex:0 0 240px;background:linear-gradient(190deg,var(--ink) 0%,var(--ink-deep) 100%);
    min-height:100vh;padding:26px 16px;position:sticky;top:0;align-self:flex-start;
    transition:transform .2s;
  }
  .sidebar .logo{padding:2px 10px 24px;border-bottom:1px solid rgba(240,230,216,.14);margin-bottom:18px;}
  .sidebar .logo b{font-family:"Playfair Display",serif;font-size:24px;font-style:italic;font-weight:600;color:var(--cream);display:block;letter-spacing:.01em;}
  .sidebar .logo span{font-size:10.5px;color:var(--gold);letter-spacing:.16em;text-transform:uppercase;}
  .nav-item{
    position:relative;display:flex;align-items:center;gap:11px;padding:11px 12px 11px 16px;border-radius:10px;
    color:var(--cream-dim);font-size:14px;font-weight:500;cursor:pointer;margin-bottom:2px;
    border:none;background:none;width:100%;text-align:left;transition:background .12s,color .12s;
  }
  .nav-item:hover{background:rgba(240,230,216,.07);color:var(--cream);}
  .nav-item.active{background:rgba(240,230,216,.1);color:var(--cream);font-weight:700;}
  .nav-item.active::before{content:"";position:absolute;left:0;top:22%;bottom:22%;width:3px;border-radius:0 3px 3px 0;background:var(--gold);}
  .nav-item .icon{font-size:16px;width:20px;text-align:center;}
  .nav-divider{border-top:1px solid rgba(240,230,216,.14);margin:14px 4px;}
  .sidebar-foot{margin-top:16px;padding:13px;background:rgba(0,0,0,.16);border-radius:12px;font-size:12.5px;}
  .sidebar-foot .name{font-weight:700;color:var(--cream);}
  .sidebar-foot div{color:var(--cream-dim);}
  .sidebar-foot .logout{color:#e0a894;cursor:pointer;font-weight:600;margin-top:6px;display:inline-block;}

  .main{flex:1;min-width:0;}
  .topbar{
    height:64px;background:#fff;box-shadow:var(--shadow-sm);
    display:flex;align-items:center;justify-content:space-between;padding:0 30px;
    position:sticky;top:0;z-index:5;
  }
  .topbar h1{font-size:18px;margin:0;font-weight:600;letter-spacing:.01em;}
  .topbar .menu-btn{display:none;background:none;border:none;font-size:20px;}
  .badge-role{
    font-size:12px;font-weight:600;padding:5px 13px;border-radius:999px;background:var(--accent-soft);color:var(--accent);
  }
  .content{padding:28px 30px 40px;max-width:1180px;}

  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:var(--shadow-md);}
  .card + .card{margin-top:16px;}
  .grid{display:grid;gap:16px;}
  .grid.cols-3{grid-template-columns:repeat(auto-fit,minmax(200px,1fr));}
  .stat-label{font-size:12.5px;color:var(--text-sub);margin-bottom:7px;font-weight:600;letter-spacing:.02em;}
  .stat-value{font-size:25px;font-weight:700;font-family:"Bai Jamjuree";letter-spacing:.01em;}

  .chip{display:inline-block;font-size:11px;padding:4px 11px;border-radius:999px;font-weight:700;letter-spacing:.01em;}
  .chip.tiktok{background:#000;color:#fff;}
  .chip.shopee{background:var(--shopee);color:#fff;}
  .chip.owner{background:var(--accent-soft);color:var(--accent);}
  .chip.neutral{background:var(--bg);color:var(--text-sub);}
  .chip.full{background:#e7f6ec;color:var(--success);}
  .chip.part{background:#fbf0e0;color:var(--warn);}

  table{width:100%;border-collapse:collapse;}
  th,td{padding:13px 14px;text-align:left;font-size:14px;border-bottom:1px solid var(--border);}
  th{color:var(--text-sub);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.06em;}
  tbody tr:last-child td{border-bottom:none;}
  td.money{text-align:right;font-family:"Bai Jamjuree";}
  .btn{
    border:none;border-radius:10px;padding:10px 18px;font-size:13.5px;font-weight:600;
    background:var(--accent);color:#fff;transition:background .12s,transform .08s;letter-spacing:.01em;
  }
  .btn:hover{background:var(--accent-hover);}
  .btn:active{transform:scale(.97);}
  .btn.ghost{background:none;border:1px solid var(--border);color:var(--text);}
  .btn.ghost:hover{background:var(--accent-soft);border-color:var(--accent-soft);color:var(--accent);}
  .btn.sm{padding:7px 13px;font-size:12.5px;}

  .placeholder{
    text-align:center;padding:60px 20px;color:var(--text-sub);
  }
  .placeholder .icon{font-size:38px;margin-bottom:14px;display:block;}
  .placeholder h3{color:var(--text);margin-bottom:6px;}

  .modal-overlay{
    position:fixed;inset:0;background:rgba(36,29,25,.5);display:none;backdrop-filter:blur(2px);
    align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .modal-overlay.active{display:flex;}
  .modal{background:#fff;border-radius:18px;padding:28px;width:100%;max-width:400px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
  .modal h3{margin:0 0 18px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;color:var(--text-sub);margin-bottom:6px;font-weight:600;}
  .field input,.field select,.field textarea{
    width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;
    transition:border-color .12s,box-shadow .12s;font-family:inherit;
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .modal-actions{display:flex;gap:10px;margin-top:22px;justify-content:flex-end;}

  .status-chip{display:inline-block;font-size:11.5px;padding:4px 12px;border-radius:999px;font-weight:700;}
  .status-chip.scheduled{background:#eef1f6;color:var(--text-sub);}
  .status-chip.live{background:#fdecec;color:var(--danger);}
  .status-chip.done{background:#e7f6ec;color:var(--success);}
  .session-card{border:1px solid var(--border);border-radius:14px;padding:17px 19px;margin-bottom:12px;transition:box-shadow .12s;}
  .session-card:hover{box-shadow:var(--shadow-sm);}
  .session-card .top-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:6px;}
  .session-card .meta{font-size:13px;color:var(--text-sub);}
  .session-photos{display:flex;gap:10px;margin-top:12px;}
  .session-photos .ph{text-align:center;font-size:11px;color:var(--text-sub);}
  .session-photos img{width:56px;height:56px;object-fit:cover;border-radius:10px;border:1px solid var(--border);display:block;margin-bottom:4px;}
  .order-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);font-size:14px;}
  .order-row:last-child{border-bottom:none;}
  .total-banner{background:var(--accent-soft);border-radius:12px;padding:17px 21px;display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .total-banner .amt{font-family:"Bai Jamjuree";font-size:25px;font-weight:700;color:var(--accent);}
  .empty-note{text-align:center;padding:50px 20px;color:var(--text-sub);}
  .empty-note .icon{font-size:34px;display:block;margin-bottom:12px;}
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .tab-bar{display:flex;gap:8px;margin-bottom:18px;}
  .tab-btn{border:1px solid var(--border);background:#fff;color:var(--text-sub);border-radius:999px;padding:7px 17px;font-size:13px;font-weight:600;transition:background .12s,color .12s;}
  .tab-btn:hover{background:var(--accent-soft);color:var(--accent);}
  .tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

  .calendar-header{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:14px;font-family:"Bai Jamjuree";font-size:16px;font-weight:600;}
  .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;}
  .calendar-weekday{text-align:center;font-size:11.5px;color:var(--text-sub);font-weight:700;padding:4px 0;letter-spacing:.03em;text-transform:uppercase;}
  .calendar-day{min-height:92px;border:1px solid var(--border);border-radius:10px;padding:7px;background:#fff;overflow:hidden;transition:box-shadow .12s;}
  .calendar-day:not(.other-month):hover{box-shadow:var(--shadow-sm);}
  .calendar-day.other-month{background:transparent;border-color:transparent;}
  .calendar-day.today{border-color:var(--accent);background:var(--accent-soft);}
  .calendar-day .day-num{font-size:12px;color:var(--text-sub);margin-bottom:4px;font-weight:600;}
  .session-pill{font-size:10.5px;padding:2px 5px;border-radius:5px;margin-bottom:3px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .session-pill.tiktok{background:#000;}
  .session-pill.shopee{background:var(--shopee);}
  @media (max-width:700px){
    .calendar-day{min-height:64px;padding:4px;}
    .calendar-day .day-num{font-size:10.5px;}
    .session-pill{font-size:9px;padding:1px 3px;}
  }

  .summary-layout{display:grid;grid-template-columns:260px 1fr;gap:18px;align-items:start;}
  .summary-list{padding:10px;}
  .summary-row{padding:12px 14px;border-radius:11px;cursor:pointer;margin-bottom:4px;transition:background .12s;}
  .summary-row:hover{background:var(--bg);}
  .summary-row.active{background:var(--accent-soft);}
  .summary-row .d{font-weight:600;font-size:13.5px;}
  .summary-row .m{font-size:12px;color:var(--text-sub);margin-top:2px;}

  @media (max-width:760px){
    .summary-layout{grid-template-columns:1fr;}
  }

  #toast-stack{
    position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:100;
    display:flex;flex-direction:column;gap:10px;align-items:center;width:100%;padding:0 16px;
  }
  .toast{
    background:var(--text);color:#fff;padding:13px 20px;border-radius:12px;font-size:14px;
    box-shadow:var(--shadow-lg);max-width:420px;text-align:center;white-space:pre-line;
    animation:toast-in .18s ease-out;
  }
  .toast.error{background:var(--danger);}
  .toast.success{background:var(--success);}
  .toast.warn{background:var(--warn);}
  @keyframes toast-in{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}

  @media (max-width:860px){
    .sidebar{
      position:fixed;left:0;top:0;bottom:0;z-index:20;transform:translateX(-100%);
      box-shadow:0 0 30px rgba(0,0,0,.2);
    }
    .sidebar.open{transform:translateX(0);}
    .topbar .menu-btn{display:block;}
  }
</style>
</head>
<body>

  <div id="toast-stack"></div>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="login-card">
      <div class="brand">Antheara</div>
      <div class="sub">Live Ops — ระบบจัดการทีมไลฟ์</div>
      <input id="pin-input" type="password" inputmode="numeric" maxlength="6" placeholder="••••">
      <button onclick="attemptLogin()">เข้าสู่ระบบ</button>
      <div class="login-error" id="login-error"></div>
      <div class="login-hint">
        รหัสทดลองใช้ (ลบออกได้ทีหลัง):<br>
        เจ้าของ: <b>0000</b> · พนักงาน TikTok: <b>1111</b> · พนักงาน Shopee: <b>2222</b>
      </div>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="app-shell">
    <div class="sidebar" id="sidebar">
      <div class="logo"><b>Antheara</b><span>Live Ops</span></div>
      <div id="nav-list"></div>
    </div>
    <div class="main">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
          <h1 id="page-title">แดชบอร์ดรวม</h1>
        </div>
        <span class="badge-role" id="role-badge"></span>
      </div>
      <div class="content" id="page-content"></div>
    </div>
  </div>

  <!-- EMPLOYEE MODAL -->
  <div class="modal-overlay" id="emp-modal">
    <div class="modal">
      <h3 id="emp-modal-title">เพิ่มพนักงาน</h3>
      <input type="hidden" id="emp-id">
      <div class="field"><label>ชื่อ</label><input id="emp-name"></div>
      <div class="field"><label>รหัส PIN</label><input id="emp-code" maxlength="6"></div>
      <div class="field"><label>บทบาท</label>
        <select id="emp-role" onchange="toggleEmpFields()">
          <option value="staff">พนักงาน</option>
          <option value="owner">เจ้าของ</option>
        </select>
      </div>
      <div id="emp-staff-fields">
        <div class="field"><label>แพลตฟอร์ม</label>
          <select id="emp-platform">
            <option value="tiktok">TikTok</option>
            <option value="shopee">Shopee</option>
          </select>
        </div>
        <div class="field"><label>ประเภทงาน</label>
          <select id="emp-employment" onchange="toggleSalaryField()">
            <option value="full-time">พนักงานประจำ</option>
            <option value="part-time">พาร์ทไทม์</option>
          </select>
        </div>
        <div class="field" id="emp-salary-field"><label>เงินเดือนฐาน (บาท)</label><input id="emp-salary" type="number"></div>
        <div class="field" id="emp-payment-freq-field"><label>ความถี่รับเงิน</label>
          <select id="emp-payment-freq">
            <option value="daily">รายวัน</option>
            <option value="weekly">รายสัปดาห์</option>
          </select>
        </div>
        <div class="field" style="border-top:1px solid var(--border);padding-top:14px;margin-top:4px;">
          <label style="font-size:13px;color:var(--text);">ข้อมูลเบื้องต้น (สำหรับ HR/จ่ายเงิน)</label>
        </div>
        <div class="field"><label>เลขบัตรประชาชน</label><input id="emp-idcard" maxlength="13" placeholder="13 หลัก"></div>
        <div class="field"><label>ธนาคาร</label><input id="emp-bank-name" placeholder="เช่น กสิกรไทย"></div>
        <div class="field"><label>เลขบัญชีธนาคาร</label><input id="emp-bank-account" placeholder="เลขที่บัญชี"></div>
        <div class="field"><label>ชื่อบัญชี</label><input id="emp-bank-account-name" placeholder="ชื่อเจ้าของบัญชี"></div>
        <div class="field">
          <label>รูปบัตรประชาชน (ใช้ตอนทำจ่าย)</label>
          <div id="emp-idcard-photo-preview" style="margin-bottom:8px;"></div>
          <input type="file" id="emp-idcard-photo-input" accept="image/*" style="display:none" onchange="handleEmpIdCardPhoto(event)">
          <button type="button" class="btn ghost sm" onclick="document.getElementById('emp-idcard-photo-input').click()">📷 แนบ/เปลี่ยนรูปบัตรประชาชน</button>
        </div>
        <div class="field" style="border-top:1px solid var(--border);padding-top:14px;margin-top:4px;">
          <label>โน้ตของเจ้าของ (ส่วนตัว ไม่แสดงให้พนักงานเห็น)</label>
          <textarea id="emp-notes" rows="3" placeholder="เช่น ลาป่วยบ่อยเดือนนี้, นัดคุยเรื่องปรับเงินเดือน, ตักเตือนเรื่องมาสาย"></textarea>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn ghost" onclick="closeEmpModal()">ยกเลิก</button>
        <button class="btn" onclick="saveEmployee()">บันทึก</button>
      </div>
    </div>
  </div>

  <!-- SESSION MODAL -->
  <div class="modal-overlay" id="session-modal">
    <div class="modal">
      <h3 id="session-modal-title">นัดหมายไลฟ์ใหม่</h3>
      <input type="hidden" id="session-id">
      <div class="field" id="session-employee-field">
        <label>พนักงาน</label>
        <select id="session-employee"></select>
      </div>
      <div class="field"><label>วันที่</label><input id="session-date" type="date"></div>
      <div class="field"><label>เวลาเริ่ม</label><input id="session-start" type="time"></div>
      <div class="field"><label>เวลาจบ</label><input id="session-end" type="time"></div>
      <div class="modal-actions">
        <button class="btn ghost" onclick="closeSessionModal()">ยกเลิก</button>
        <button class="btn" onclick="saveSession()">บันทึก</button>
      </div>
    </div>
  </div>

  <!-- PRODUCT MODAL -->
  <div class="modal-overlay" id="product-modal">
    <div class="modal">
      <h3 id="product-modal-title">เพิ่มสินค้า</h3>
      <input type="hidden" id="product-id">
      <div class="field"><label>ชื่อสินค้า</label><input id="product-name"></div>
      <div class="field"><label>ราคา (บาท)</label><input id="product-price" type="number" min="0"></div>
      <div class="field"><label>จำนวนคงเหลือ</label><input id="product-stock" type="number" min="0"></div>
      <div class="field"><label>รายละเอียดสินค้า (ส่วนผสม/จุดขาย/วิธีใช้ — สำหรับ MC ศึกษา)</label><textarea id="product-description" rows="4" placeholder="เช่น ส่วนผสมหลัก, กลิ่น, เหมาะกับผิวแบบไหน, จุดขายเวลาพรีเซนต์"></textarea></div>
      <div class="modal-actions">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  function showToast(message, type){
    const stack = document.getElementById("toast-stack");
    const el = document.createElement("div");
    el.className = "toast" + (type ? " " + type : "");
    el.textContent = message;
    stack.appendChild(el);
    setTimeout(() => el.remove(), 3200);
  }

  // ===== Supabase data layer =====
  // The anon key is public in client-side code (normal for Supabase), but it grants
  // no direct table access — every read/write goes through PIN-checked SECURITY DEFINER
  // functions (see supabase-schema-secure.sql), so knowing the anon key alone isn't
  // enough to read or change any data.
  const SUPABASE_URL = "https://dlxszrpiwomjfniqbnpe.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRseHN6cnBpd29tamZuaXFibnBlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3NDgzMTcsImV4cCI6MjA5OTMyNDMxN30.INpHHMeERE5U_0y28zjF9o7LC2NS70IaIbK98-XB5n8";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const SESSION_KEY = "liveTeamOpsSessionCode";

  let data = { employees: [], commissionTiers: [], liveSessions: [], products: [], orders: [], documents: [], quizLevels: [], certifications: [] };
  let currentEmployee = null;
  let myCode = null;
  let dashboardRangeStart = null;
  let dashboardRangeEnd = null;

  function mapEmployee(r){
    return {
      id:r.id, name:r.name, role:r.role, code:r.code, platform:r.platform,
      employmentType:r.employment_type, baseSalary:r.base_salary,
      idCardNumber:r.id_card_number, idCardPhoto:r.id_card_photo, bankName:r.bank_name,
      bankAccountNumber:r.bank_account_number, bankAccountName:r.bank_account_name,
      paymentFrequency:r.payment_frequency, address:r.address, notes:r.notes
    };
  }
  function mapTier(r){ return {id:r.id, minSales:r.min_sales, maxSales:r.max_sales, ratePercent:r.rate_percent, sortOrder:r.sort_order}; }
  function mapProduct(r){ return {id:r.id, name:r.name, price:r.price, stockQty:r.stock_qty, description:r.description}; }
  function mapSession(r){ return {id:r.id, employeeId:r.employee_id, platform:r.platform, date:r.date, startTime:r.start_time, endTime:r.end_time, status:r.status, checkInPhoto:r.check_in_photo, checkInTime:r.check_in_time, salesProofPhoto:r.sales_proof_photo, actualEndTime:r.actual_end_time, deleteRequested:r.delete_requested}; }
  function mapOrder(r){ return {id:r.id, liveSessionId:r.live_session_id, employeeId:r.employee_id, platform:r.platform, productId:r.product_id, productName:r.product_name, qty:r.qty, pricePerUnit:r.price_per_unit, total:r.total, customerName:r.customer_name, timestamp:r.created_at, deleteRequested:r.delete_requested}; }
  function mapDocument(r){ return {id:r.id, category:r.category, title:r.title, content:r.content, photo:r.photo, createdAt:r.created_at}; }
  function mapQuizLevel(r){ return {id:r.id, name:r.name, sortOrder:r.sort_order, passingScorePercent:r.passing_score_percent}; }
  function mapCertification(r){ return {employeeId:r.employee_id, levelId:r.level_id, scorePercent:r.score_percent, passed:r.passed, attemptedAt:r.attempted_at}; }

  // Calls rpc_bootstrap with the given PIN; returns the matched employee row, or null if
  // the PIN doesn't match anyone. Populates `data` from the payload either way it succeeds.
  async function bootstrapWithCode(code){
    const { data: payload, error } = await sb.rpc("rpc_bootstrap", { p_code: code });
    if(error) throw error;
    if(!payload) return null;
    data.employees = (payload.employees || []).map(mapEmployee);
    data.commissionTiers = (payload.commission_tiers || []).map(mapTier);
    data.liveSessions = (payload.live_sessions || []).map(mapSession);
    data.products = (payload.products || []).map(mapProduct);
    data.orders = (payload.orders || []).map(mapOrder);
    data.documents = (payload.documents || []).map(mapDocument);
    data.quizLevels = (payload.quiz_levels || []).map(mapQuizLevel);
    data.certifications = (payload.certifications || []).map(mapCertification);
    return mapEmployee(payload.me);
  }

  async function refreshAllData(){
    const me = await bootstrapWithCode(myCode);
    if(!me) throw new Error("เซสชันหมดอายุ กรุณาล็อกอินใหม่");
    currentEmployee = me;
  }

  const MENUS = [
    {id:"dashboard", icon:"📊", label:"แดชบอร์ดรวม", roles:["owner","staff"]},
    {id:"live-schedule", icon:"🎥", label:"ตารางไลฟ์", roles:["owner","staff"]},
    {id:"sales-entry", icon:"🛒", label:"บันทึกยอดขาย", roles:["owner","staff"]},
    {id:"live-summary", icon:"📋", label:"สรุปผลไลฟ์", roles:["owner","staff"]},
    {id:"stock", icon:"📦", label:"สต๊อกสินค้า", roles:["owner","staff"]},
    {id:"product-info", icon:"🧴", label:"ข้อมูลสินค้า", roles:["owner","staff"]},
    {id:"documents", icon:"📄", label:"เอกสาร", roles:["owner","staff"]},
    {id:"mc-certification", icon:"🎓", label:"บททดสอบ MC", roles:["owner","staff"]},
    {id:"my-profile", icon:"🪪", label:"ข้อมูลส่วนตัว", roles:["staff"]},
    {id:"payroll", icon:"💰", label:"เงินเดือน & ค่าคอม", roles:["owner"]},
    {id:"employees", icon:"👥", label:"จัดการพนักงาน", roles:["owner"]},
    {id:"hr-profiles", icon:"🪪", label:"ข้อมูลพนักงาน (HR)", roles:["owner"]}
  ];

  let currentPage = "dashboard";

  async function attemptLogin(){
    const code = document.getElementById("pin-input").value.trim();
    const btn = document.querySelector("#login-screen button");
    btn.disabled = true; btn.textContent = "กำลังตรวจสอบ...";
    let me;
    try {
      me = await bootstrapWithCode(code);
    } catch(err){
      document.getElementById("login-error").textContent = "เชื่อมต่อฐานข้อมูลไม่ได้ ลองใหม่อีกครั้ง";
      btn.disabled = false; btn.textContent = "เข้าสู่ระบบ";
      return;
    }
    btn.disabled = false; btn.textContent = "เข้าสู่ระบบ";
    if(!me){
      document.getElementById("login-error").textContent = "รหัสไม่ถูกต้อง ลองใหม่อีกครั้ง";
      return;
    }
    myCode = code;
    currentEmployee = me;
    sessionStorage.setItem(SESSION_KEY, code);
    await enterApp();
  }

  async function enterApp(){
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app-shell").classList.add("active");
    renderNav();
    await goToPage("dashboard");
  }

  function logout(){
    sessionStorage.removeItem(SESSION_KEY);
    currentEmployee = null;
    myCode = null;
    document.getElementById("app-shell").classList.remove("active");
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("pin-input").value = "";
    document.getElementById("login-error").textContent = "";
  }

  function renderNav(){
    const list = document.getElementById("nav-list");
    const visible = MENUS.filter(m => m.roles.includes(currentEmployee.role));
    list.innerHTML = visible.map(m =>
      `<button class="nav-item" data-page="${m.id}" onclick="goToPage('${m.id}')">
        <span class="icon">${m.icon}</span><span>${m.label}</span>
      </button>`
    ).join("") + `
      <div class="nav-divider"></div>
      <div class="sidebar-foot">
        <div class="name">${currentEmployee.name}</div>
        <div>${roleLabel(currentEmployee)}</div>
        <span class="logout" onclick="logout()">ออกจากระบบ</span>
      </div>
    `;
  }

  function roleLabel(emp){
    if(emp.role === "owner") return "เจ้าของร้าน";
    const platform = emp.platform === "tiktok" ? "TikTok" : "Shopee";
    const type = emp.employmentType === "full-time" ? "พนักงานประจำ" : "พาร์ทไทม์";
    return `${platform} · ${type}`;
  }

  async function goToPage(pageId){
    currentPage = pageId;
    document.querySelectorAll(".nav-item").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.page === pageId);
    });
    const menu = MENUS.find(m => m.id === pageId);
    document.getElementById("page-title").textContent = menu ? menu.label : "";
    document.getElementById("role-badge").textContent = roleLabel(currentEmployee);
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("page-content").innerHTML = `<div class="meta" style="padding:20px 0;">กำลังโหลดข้อมูล...</div>`;
    try {
      await refreshAllData();
    } catch(err){
      showToast("เชื่อมต่อฐานข้อมูลไม่ได้ — " + err.message, "error");
    }
    renderPage(pageId);
  }

  function renderPage(pageId){
    const el = document.getElementById("page-content");
    if(pageId === "dashboard"){ el.innerHTML = renderDashboard(); return; }
    if(pageId === "employees"){ el.innerHTML = renderEmployees(); return; }
    if(pageId === "live-schedule"){ el.innerHTML = renderLiveSchedule(); return; }
    if(pageId === "sales-entry"){ el.innerHTML = renderSalesEntry(); return; }
    if(pageId === "live-summary"){ el.innerHTML = renderLiveSummary(); return; }
    if(pageId === "stock"){ el.innerHTML = renderStock(); return; }
    if(pageId === "payroll"){ el.innerHTML = renderPayroll(); return; }
    if(pageId === "my-profile"){ el.innerHTML = renderMyProfile(); return; }
    if(pageId === "hr-profiles"){ el.innerHTML = renderHrProfiles(); return; }
    if(pageId === "product-info"){ el.innerHTML = renderProductInfo(); return; }
    if(pageId === "documents"){ el.innerHTML = renderDocuments(); return; }
    if(pageId === "mc-certification"){ el.innerHTML = renderMcCertification(); return; }
    el.innerHTML = renderPlaceholder(pageId);
  }

  function renderPlaceholder(pageId){
    const menu = MENUS.find(m => m.id === pageId);
    return `<div class="card"><div class="placeholder">
      <span class="icon">${menu.icon}</span>
      <h3>${menu.label}</h3>
      <p>โมดูลนี้จะพร้อมใช้งานใน TASK ถัดไป — ตอนนี้เป็นแค่โครงเมนูให้เห็นสิทธิ์การเข้าถึง</p>
    </div></div>`;
  }

  function salesByPlatform(orders){
    return orders.reduce((acc,o) => { acc[o.platform] = (acc[o.platform]||0) + o.total; return acc; }, {tiktok:0, shopee:0});
  }

  function commissionForEmployee(emp, totalSales){
    if(emp.employmentType !== "full-time") return null;
    const tier = findMatchingTier(totalSales);
    return tier ? totalSales * tier.ratePercent / 100 : 0;
  }
  function defaultDashboardRangeStart(){
    const d = new Date(); d.setDate(1);
    return d.toISOString().slice(0,10);
  }
  function defaultDashboardRangeEnd(){
    return new Date().toISOString().slice(0,10);
  }
  function renderDashboardRangeResult(startDate, endDate){
    const isOwner = currentEmployee.role === "owner";
    const baseOrders = isOwner ? data.orders : data.orders.filter(o => o.employeeId === currentEmployee.id);
    const rangeOrders = baseOrders.filter(o => {
      const d = o.timestamp.slice(0,10);
      return d >= startDate && d <= endDate;
    });
    const byPlatform = salesByPlatform(rangeOrders);
    const total = rangeOrders.reduce((s,o) => s + o.total, 0);
    let peopleTable = "";
    if(isOwner){
      const byEmployee = {};
      rangeOrders.forEach(o => { byEmployee[o.employeeId] = (byEmployee[o.employeeId] || 0) + o.total; });
      const rows = data.employees.filter(e => e.role === "staff").map(e => {
        const empTotal = byEmployee[e.id] || 0;
        const commission = commissionForEmployee(e, empTotal);
        return `
          <tr>
            <td>${e.name}</td>
            <td><span class="chip ${e.platform}">${e.platform === "tiktok" ? "TikTok" : "Shopee"}</span></td>
            <td class="money">฿${empTotal.toLocaleString()}</td>
            <td class="money">${commission === null ? "-" : "฿" + commission.toLocaleString(undefined, {maximumFractionDigits:0})}</td>
          </tr>`;
      }).join("");
      peopleTable = `
        <table style="margin-top:14px;"><thead><tr><th>ชื่อ</th><th>แพลตฟอร์ม</th><th>ยอดขายช่วงนี้</th><th>ค่าคอมประมาณการ</th></tr></thead><tbody>${rows}</tbody></table>
        <p class="meta" style="margin-top:8px;">*ค่าคอมประมาณการคำนวณจากยอดขายรวมเฉพาะช่วงที่เลือก เทียบกับตารางขั้นบันได ใช้ดูภาพรวมเท่านั้น — ยอดค่าคอมจริงคำนวณจากยอดขายรวมทั้งเดือนปฏิทินที่หน้า "เงินเดือน & ค่าคอม"</p>`;
    }
    return `
      <div class="grid cols-3" style="margin-top:14px;">
        <div><div class="stat-label">TikTok</div><div class="stat-value">฿${byPlatform.tiktok.toLocaleString()}</div></div>
        <div><div class="stat-label">Shopee</div><div class="stat-value">฿${byPlatform.shopee.toLocaleString()}</div></div>
        <div><div class="stat-label">รวม</div><div class="stat-value">฿${total.toLocaleString()}</div></div>
      </div>
      ${peopleTable}`;
  }
  function applyDashboardRange(){
    const start = document.getElementById("dash-range-start").value;
    const end = document.getElementById("dash-range-end").value;
    if(!start || !end){ showToast("เลือกวันที่ให้ครบ", "error"); return; }
    if(start > end){ showToast("วันที่เริ่มต้องไม่เกินวันที่สิ้นสุด", "error"); return; }
    dashboardRangeStart = start;
    dashboardRangeEnd = end;
    document.getElementById("dashboard-range-result").innerHTML = renderDashboardRangeResult(start, end);
  }

  function recentSessionsHtml(sessions, showEmployeeName){
    const statusClassMap = {"นัดหมาย":"scheduled","กำลังไลฟ์":"live","จบแล้ว":"done"};
    return sessions.slice().sort((a,b) => (b.date+b.startTime).localeCompare(a.date+a.startTime)).slice(0,5).map(s => {
      const emp = getEmployeeById(s.employeeId);
      return `
        <div class="order-row">
          <span>${s.date} · ${platformLabel(s.platform)}${showEmployeeName ? " · " + (emp ? emp.name : "-") : ""}</span>
          <span class="status-chip ${statusClassMap[s.status]}">${s.status}</span>
        </div>`;
    }).join("") || `<div class="meta" style="padding:8px 0;">ยังไม่มีรอบไลฟ์</div>`;
  }

  function renderDashboard(){
    const today = new Date().toISOString().slice(0,10);
    const month = new Date().toISOString().slice(0,7);
    const isOwner = currentEmployee.role === "owner";
    const visibleOrders = isOwner ? data.orders : data.orders.filter(o => o.employeeId === currentEmployee.id);
    const visibleSessions = isOwner ? data.liveSessions : data.liveSessions.filter(s => s.employeeId === currentEmployee.id);

    const todayOrders = visibleOrders.filter(o => o.timestamp.slice(0,10) === today);
    const monthOrders = visibleOrders.filter(o => o.timestamp.slice(0,7) === month);
    const todayTotal = todayOrders.reduce((s,o) => s + o.total, 0);
    const monthTotal = monthOrders.reduce((s,o) => s + o.total, 0);

    if(isOwner){
      const todayByPlatform = salesByPlatform(todayOrders);
      const monthByPlatform = salesByPlatform(monthOrders);
      const salesByEmployeeToday = {};
      todayOrders.forEach(o => { salesByEmployeeToday[o.employeeId] = (salesByEmployeeToday[o.employeeId] || 0) + o.total; });
      const salesByEmployeeMonth = {};
      monthOrders.forEach(o => { salesByEmployeeMonth[o.employeeId] = (salesByEmployeeMonth[o.employeeId] || 0) + o.total; });

      const rows = data.employees.filter(e => e.role === "staff").map(e => {
        const monthTotalForEmp = salesByEmployeeMonth[e.id] || 0;
        const commission = commissionForEmployee(e, monthTotalForEmp);
        return `
        <tr>
          <td>${e.name}</td>
          <td><span class="chip ${e.platform}">${e.platform === "tiktok" ? "TikTok" : "Shopee"}</span></td>
          <td><span class="chip ${e.employmentType === "full-time" ? "full" : "part"}">${e.employmentType === "full-time" ? "ประจำ" : "พาร์ทไทม์"}</span></td>
          <td class="money">฿${(salesByEmployeeToday[e.id] || 0).toLocaleString()}</td>
          <td class="money">฿${monthTotalForEmp.toLocaleString()}</td>
          <td class="money">${commission === null ? "-" : "฿" + commission.toLocaleString(undefined, {maximumFractionDigits:0})}</td>
        </tr>`;
      }).join("");
      if(!dashboardRangeStart) dashboardRangeStart = defaultDashboardRangeStart();
      if(!dashboardRangeEnd) dashboardRangeEnd = defaultDashboardRangeEnd();
      return `
        <div class="card"><h3 style="margin-top:0;margin-bottom:14px;">ยอดขายวันนี้ (รวมทุกคนต่อแพลตฟอร์ม)</h3>
          <div class="grid cols-3">
            <div><div class="stat-label">TikTok</div><div class="stat-value">฿${todayByPlatform.tiktok.toLocaleString()}</div></div>
            <div><div class="stat-label">Shopee</div><div class="stat-value">฿${todayByPlatform.shopee.toLocaleString()}</div></div>
            <div><div class="stat-label">รวม</div><div class="stat-value">฿${todayTotal.toLocaleString()}</div></div>
          </div>
        </div>
        <div class="card"><h3 style="margin-top:0;margin-bottom:14px;">ยอดขายเดือนนี้ (รวมทุกคนต่อแพลตฟอร์ม)</h3>
          <div class="grid cols-3">
            <div><div class="stat-label">TikTok</div><div class="stat-value">฿${monthByPlatform.tiktok.toLocaleString()}</div></div>
            <div><div class="stat-label">Shopee</div><div class="stat-value">฿${monthByPlatform.shopee.toLocaleString()}</div></div>
            <div><div class="stat-label">รวม</div><div class="stat-value">฿${monthTotal.toLocaleString()}</div></div>
          </div>
        </div>

  async function saveEmployee(){
    const id = document.getElementById("emp-id").value;
    const name = document.getElementById("emp-name").value.trim();
    const code = document.getElementById("emp-code").value.trim();
    const role = document.getElementById("emp-role").value;
    if(!name || !code){ showToast("กรอกชื่อและรหัส PIN ให้ครบ", "error"); return; }
    const codeClash = data.employees.find(e => e.code === code && String(e.id) !== String(id));
    if(codeClash){ showToast("รหัส PIN นี้ถูกใช้แล้วโดย " + codeClash.name, "error"); return; }

    const employmentType = role === "owner" ? null : document.getElementById("emp-employment").value;
    const platform = role === "owner" ? "both" : document.getElementById("emp-platform").value;
    const baseSalary = role === "owner" ? null :
      (employmentType === "full-time" ? Number(document.getElementById("emp-salary").value) || 0 : null);
    const paymentFrequency = role === "owner" ? null :
      (employmentType === "part-time" ? document.getElementById("emp-payment-freq").value : null);
    const idCardNumber = role === "owner" ? null : (document.getElementById("emp-idcard").value.trim() || null);
    const bankName = role === "owner" ? null : (document.getElementById("emp-bank-name").value.trim() || null);
    const bankAccountNumber = role === "owner" ? null : (document.getElementById("emp-bank-account").value.trim() || null);
    const bankAccountName = role === "owner" ? null : (document.getElementById("emp-bank-account-name").value.trim() || null);
    const idCardPhoto = role === "owner" ? null : pendingEmpIdCardPhoto;
    const notes = role === "owner" ? null : (document.getElementById("emp-notes").value.trim() || null);

    const { error } = await sb.rpc("rpc_upsert_employee", {
      p_code: myCode, p_id: id ? Number(id) : null, p_name: name, p_emp_code: code,
      p_role: role, p_platform: platform, p_employment_type: employmentType, p_base_salary: baseSalary,
      p_id_card_number: idCardNumber, p_bank_name: bankName, p_bank_account_number: bankAccountNumber,
      p_bank_account_name: bankAccountName, p_payment_frequency: paymentFrequency, p_id_card_photo: idCardPhoto,
      p_notes: notes
    });
    if(error){ showToast("บันทึกไม่สำเร็จ: " + error.message, "error"); return; }

    await refreshAllData();
    closeEmpModal();
    renderPage("employees");
  }

  async function deleteEmployee(id){

      pendingDeleteEmployeeId = id;
      showToast("กดลบอีกครั้งเพื่อยืนยันการลบ", "warn");
      return;

    pendingDeleteEmployeeId = null;
    const { error } = await sb.rpc("rpc_delete_employee", { p_code: myCode, p_id: id });
    if(error){ showToast("ลบไม่สำเร็จ: " + error.message, "error"); return; }
    await refreshAllData();
    showToast("ลบพนักงานเรียบร้อย", "success");
    renderPage("employees");
  }

  function getEmployeeById(id){ return data.employees.find(e => e.id === id); }

  function platformLabel(p){ return p === "tiktok" ? "TikTok" : "Shopee"; }
  function durationMinutesFromRange(startTime, endTime){
    const [sh,sm] = startTime.split(":").map(Number);
    const [eh,em] = endTime.split(":").map(Number);
    let startMin = sh*60+sm, endMin = eh*60+em;
    if(endMin <= startMin) endMin += 24*60;
    return endMin - startMin;
  }
  function formatMinutes(totalMin){
    const hours = Math.floor(totalMin/60), mins = totalMin % 60;
    return mins === 0 ? `${hours} ชั่วโมง` : `${hours} ชม. ${mins} นาที`;
  }
  function sessionDurationLabel(s){
    return formatMinutes(durationMinutesFromRange(s.startTime, s.endTime));
  }
  function actualDurationDisplay(s){
    if(s.status === "จบแล้ว" && s.checkInTime && s.actualEndTime){
      const actualMin = Math.round((new Date(s.actualEndTime) - new Date(s.checkInTime)) / 60000);
      const schedMin = durationMinutesFromRange(s.startTime, s.endTime);
      const label = "ไลฟ์จริง " + formatMinutes(actualMin);
      if(actualMin < schedMin){
        return `${label} <span class="status-chip live">⚠️ สั้นกว่ากำหนด ${formatMinutes(schedMin)}</span>`;
      }
      return `${label} <span class="status-chip done">✅ ครบตามกำหนด</span>`;
    }
    return sessionDurationLabel(s);
  }
  function findActiveSession(employeeId){

  }
  function resizeImageFile(file, maxDim, cb){
    const reader = new FileReader();
    reader.onload = function(e){
      const img = new Image();
      img.onload = function(){
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
        else if(h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        cb(canvas.toDataURL("image/jpeg", 0.7));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

    calendarMonth = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");

  function renderLiveSchedule(){

    const body = scheduleViewMode === "calendar"
      ? renderCalendarView(sessions)
      : (sessions.map(s => sessionCardHtml(s)).join("") ||
         `<div class="empty-note"><span class="icon">🎥</span>ยังไม่มีตารางไลฟ์ในหมวดนี้ กด "+ นัดหมายไลฟ์ใหม่" เพื่อเริ่มลงตาราง</div>`);

  function renderCalendarView(sessions){
    const [year, monthNum] = calendarMonth.split("-").map(Number);
    const firstDay = new Date(year, monthNum-1, 1);
    const daysInMonth = new Date(year, monthNum, 0).getDate();
    const startWeekday = firstDay.getDay();
    const todayStr = new Date().toISOString().slice(0,10);
    const monthLabel = firstDay.toLocaleDateString("th-TH", {month:"long", year:"numeric"});

    const sessionsByDate = {};
    sessions.forEach(s => {
      if(!sessionsByDate[s.date]) sessionsByDate[s.date] = [];
      sessionsByDate[s.date].push(s);
    });

    const statusDot = {"นัดหมาย":"⚪","กำลังไลฟ์":"🔴","จบแล้ว":"🟢"};
    let cells = "";
    for(let i=0;i<startWeekday;i++) cells += `<div class="calendar-day other-month"></div>`;
    for(let day=1; day<=daysInMonth; day++){
      const dateStr = `${year}-${String(monthNum).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
      const daySessions = (sessionsByDate[dateStr] || []).slice().sort((a,b) => a.startTime.localeCompare(b.startTime));
      const isToday = dateStr === todayStr;
      const pills = daySessions.map(s => {
        const emp = getEmployeeById(s.employeeId);
        const empName = emp ? emp.name : "-";
        return `<div class="session-pill ${s.platform}" title="${empName} · ${s.startTime}-${s.endTime} · ${s.status}">${statusDot[s.status]} ${s.startTime} ${empName}</div>`;
      }).join("");
      cells += `<div class="calendar-day ${isToday ? "today" : ""}">
        <div class="day-num">${day}</div>
        ${pills}
      </div>`;
    }

    const weekdayLabels = ["อา","จ","อ","พ","พฤ","ศ","ส"].map(d => `<div class="calendar-weekday">${d}</div>`).join("");

    return `
      <div class="calendar-header">
        <button class="btn ghost sm" onclick="shiftCalendarMonth(-1)">‹</button>
        <b>${monthLabel}</b>
        <button class="btn ghost sm" onclick="shiftCalendarMonth(1)">›</button>
      </div>
      <div class="calendar-grid">
        ${weekdayLabels}
        ${cells}
      </div>`;
  }

  async function endLiveSession(sessionId, photoDataUrl){
    const s = data.liveSessions.find(x => x.id === sessionId);
    const checkInTime = s ? s.checkInTime : null;
    const startTime = s ? s.startTime : null;
    const endTime = s ? s.endTime : null;
    const actualEndTime = new Date().toISOString();

    const { error } = await sb.rpc("rpc_end_live", { p_code: myCode, p_session_id: sessionId, p_photo: photoDataUrl });
    if(error){ showToast("ปิดไลฟ์ไม่สำเร็จ: " + error.message, "error"); return; }
    await refreshAllData();
    renderPage("live-schedule");

    if(checkInTime){
      const schedMin = durationMinutesFromRange(startTime, endTime);
      const actualMin = Math.round((new Date(actualEndTime) - new Date(checkInTime)) / 60000);
      if(actualMin < schedMin){
        showToast(`ปิดไลฟ์แล้ว — ไลฟ์จริง ${formatMinutes(actualMin)} (กำหนดไว้ ${formatMinutes(schedMin)})\n⚠️ สั้นกว่าที่กำหนด ระบบบันทึกเวลาจริงไว้ให้ตรวจสอบแล้ว`, "warn");
      } else {
        showToast(`ปิดไลฟ์แล้ว — ไลฟ์จริง ${formatMinutes(actualMin)} ครบตามที่กำหนด (${formatMinutes(schedMin)}) ✅`, "success");
      }
    }
  }

      .slice().sort((a,b) => (b.date+b.startTime).localeCompare(a.date+a.startTime));

    if(sessions.length === 0){
      return `<div class="card"><div class="empty-note"><span class="icon">📋</span>ยังไม่มีรอบไลฟ์ที่จบแล้ว</div></div>`;
    }
    if(selectedSummarySessionId === null || !sessions.find(s => s.id === selectedSummarySessionId)){
      selectedSummarySessionId = sessions[0].id;
    }
    const listHtml = sessions.map(s => summaryListRowHtml(s)).join("");
    const detailHtml = summaryDetailHtml(sessions.find(s => s.id === selectedSummarySessionId));
    return `
      <div class="summary-layout">
        <div class="card summary-list">${listHtml}</div>
        <div>${detailHtml}</div>
      </div>`;
  }

  function summaryListRowHtml(s){
    const emp = getEmployeeById(s.employeeId);
    const active = s.id === selectedSummarySessionId;
    return `
      <div class="summary-row ${active ? "active" : ""}" onclick="selectSummary(${s.id})">
        <div class="d">${s.date} · ${s.startTime}-${s.endTime}</div>
        <div class="m">${platformLabel(s.platform)}${currentEmployee.role === "owner" ? " · " + (emp ? emp.name : "-") : ""}</div>
      </div>`;
  }

  function selectSummary(id){
    selectedSummarySessionId = id;
    renderPage("live-summary");
  }

  function summaryDetailHtml(s){
    const orders = data.orders.filter(o => o.liveSessionId === s.id);
    const total = orders.reduce((sum,o) => sum + o.total, 0);
    const emp = getEmployeeById(s.employeeId);

    const byProduct = {};
    orders.forEach(o => {
      if(!o.productId) return; // ยอดรวมด่วนไม่ระบุสินค้า ไม่นับในสินค้าขายดี
      if(!byProduct[o.productId]) byProduct[o.productId] = {name: o.productName, qty: 0, revenue: 0};
      byProduct[o.productId].qty += o.qty;
      byProduct[o.productId].revenue += o.total;
    });
    const quickTotal = orders.filter(o => !o.productId).reduce((sum,o) => sum + o.total, 0);
    const top5 = Object.values(byProduct).sort((a,b) => b.qty - a.qty).slice(0,5);
    const topRows = top5.map((p,i) => `
      <div class="order-row">
        <span>#${i+1} ${p.name}</span>
        <b>${p.qty} ชิ้น · ฿${p.revenue.toLocaleString()}</b>
      </div>`).join("") || `<div class="meta" style="padding:8px 0;">ยังไม่มีออเดอร์ทีละสินค้าในรอบนี้</div>`;
    const quickNote = quickTotal > 0
      ? `<div class="meta" style="margin-top:10px;">+ มียอดรวมด่วนที่ไม่ระบุสินค้าอีก ฿${quickTotal.toLocaleString()} (ไม่นับในอันดับนี้)</div>`
      : "";

    return `
      <div class="card">
        <div class="toolbar">
          <h3 style="margin:0;">${s.date} · ${s.startTime}-${s.endTime} <span class="chip ${s.platform}">${platformLabel(s.platform)}</span></h3>
          <span class="meta">${actualDurationDisplay(s)}${currentEmployee.role === "owner" ? " · " + (emp ? emp.name : "-") : ""}</span>
        </div>
        <div class="grid cols-3">
          <div><div class="stat-label">ยอดขายรวม</div><div class="stat-value">฿${total.toLocaleString()}</div></div>
          <div><div class="stat-label">จำนวนออเดอร์</div><div class="stat-value">${orders.length}</div></div>
          <div><div class="stat-label">สินค้าขายดีอันดับ 1</div><div class="stat-value" style="font-size:16px;">${top5[0] ? top5[0].name : "-"}</div></div>
        </div>
      </div>
      <div class="card">
        <h3 style="margin-top:0;">สินค้าขายดี 5 อันดับ</h3>
        ${topRows}
        ${quickNote}
      </div>
      <div class="card">
        <h3 style="margin-top:0;">หลักฐานประกอบ</h3>
        <div class="session-photos" style="gap:22px;">
          ${s.checkInPhoto ? `<div class="ph"><img src="${s.checkInPhoto}" style="width:120px;height:120px;">เช็คอินตอนเริ่มไลฟ์</div>` : `<div class="meta">ไม่มีรูปเช็คอิน</div>`}
          ${s.salesProofPhoto ? `<div class="ph"><img src="${s.salesProofPhoto}" style="width:120px;height:120px;">แคปยอดตอนปิดไลฟ์</div>` : `<div class="meta">ไม่มีรูปแคปยอด</div>`}
        </div>
      </div>
      ${currentEmployee.role === "owner" ? `
      <div class="card">
        <h3 style="margin-top:0;">ออเดอร์ทั้งหมดในรอบนี้ (แก้ไข/ลบได้เผื่อมีข้อมูลผิด)</h3>
        ${orders.slice().reverse().map(o => `
          <div class="order-row">
            <span>${o.productId ? `${o.productName} ×${o.qty}` : o.productName}${o.customerName ? " · " + o.customerName : ""}</span>
            <span style="display:flex;align-items:center;gap:10px;">
              <b>฿${o.total.toLocaleString()}</b>
              ${orderActionButtonsHtml(o, true)}
            </span>
          </div>`).join("") || `<div class="meta" style="padding:8px 0;">ยังไม่มีออเดอร์ในรอบนี้</div>`}
      </div>` : ""}`;
  }

  // ===== stock =====
  const LOW_STOCK_THRESHOLD = 5;

  function renderStock(){
    const isOwner = currentEmployee.role === "owner";
    const rows = data.products.map(p => {
      const low = p.stockQty <= LOW_STOCK_THRESHOLD;
      return `
        <tr>
          <td>${p.name}</td>
          <td>฿${p.price.toLocaleString()}</td>
          <td>${low ? `<span class="chip warn">เหลือน้อย ${p.stockQty}</span>` : p.stockQty}</td>
          ${isOwner ? `<td style="display:flex;gap:8px;">
            <button class="btn ghost sm" onclick="openProductModal(${p.id})">แก้ไข</button>
            <button class="btn ghost sm" onclick="deleteProduct(${p.id})">ลบ</button>
          </td>` : ""}
        </tr>`;
    }).join("") || `<tr><td colspan="4">ยังไม่มีสินค้าในสต๊อก</td></tr>`;
    return `
      <div class="card">
        <div class="toolbar">
          <h3 style="margin:0;">สต๊อกสินค้า (ก้อนเดียว ใช้ร่วมกันทั้ง TikTok/Shopee)</h3>
          ${isOwner ? `<button class="btn" onclick="openProductModal()">+ เพิ่มสินค้า</button>` : ""}
        </div>
        <table>
          <thead><tr><th>สินค้า</th><th>ราคา</th><th>คงเหลือ</th>${isOwner ? "<th></th>" : ""}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function openProductModal(id){
    if(currentEmployee.role !== "owner") return;
    const modal = document.getElementById("product-modal");
    if(id){
      const p = data.products.find(x => x.id === id);
      document.getElementById("product-modal-title").textContent = "แก้ไขสินค้า";
      document.getElementById("product-id").value = p.id;
      document.getElementById("product-name").value = p.name;
      document.getElementById("product-price").value = p.price;
      document.getElementById("product-stock").value = p.stockQty;
      document.getElementById("product-description").value = p.description || "";
    } else {
      document.getElementById("product-modal-title").textContent = "เพิ่มสินค้า";
      document.getElementById("product-id").value = "";
      document.getElementById("product-name").value = "";
      document.getElementById("product-price").value = "";
      document.getElementById("product-stock").value = "";
      document.getElementById("product-description").value = "";
    }
    modal.classList.add("active");
  }
  function closeProductModal(){
    document.getElementById("product-modal").classList.remove("active");
  }
  async function saveProduct(){
    const id = document.getElementById("product-id").value;
    const name = document.getElementById("product-name").value.trim();
    const price = Number(document.getElementById("product-price").value);
    const stockQty = Number(document.getElementById("product-stock").value);
    const description = document.getElementById("product-description").value.trim() || null;
    if(!name || !price || price <= 0 || isNaN(stockQty) || stockQty < 0){
      showToast("กรอกชื่อ ราคา และจำนวนคงเหลือให้ครบและถูกต้อง", "error");
      return;
    }
    const { error } = await sb.rpc("rpc_upsert_product", {
      p_code: myCode, p_id: id ? Number(id) : null, p_name: name, p_price: price, p_stock: stockQty, p_description: description
    });
    if(error){ showToast("บันทึกไม่สำเร็จ: " + error.message, "error"); return; }
    await refreshAllData();
    closeProductModal();
    renderPage(currentPage);
  }

  let pendingDeleteProductId = null;
  async function deleteProduct(id){
    if(pendingDeleteProductId !== id){
      pendingDeleteProductId = id;
      showToast("กดลบอีกครั้งเพื่อยืนยันการลบ", "warn");
      return;
    }
    pendingDeleteProductId = null;
    const { error } = await sb.rpc("rpc_delete_product", { p_code: myCode, p_id: id });
    if(error){ showToast("ลบไม่สำเร็จ: " + error.message, "error"); return; }
    await refreshAllData();
    showToast("ลบสินค้าเรียบร้อย", "success");
    renderPage(currentPage);
  }

  // ===== payroll (เฉพาะพนักงานประจำ) =====
  function findMatchingTier(totalSales){
    const active = data.commissionTiers.filter(t => t.minSales !== null && t.minSales !== undefined);
    const eligible = active.filter(t => totalSales >= t.minSales && (t.maxSales === null || t.maxSales === undefined || totalSales <= t.maxSales));
    if(eligible.length === 0) return null;
    return eligible.reduce((best,t) => (best === null || t.minSales > best.minSales) ? t : best, null);
  }

  function monthlySales(employeeId, monthStr){
    return data.orders
      .filter(o => o.employeeId === employeeId && o.timestamp.slice(0,7) === monthStr)
      .reduce((sum,o) => sum + o.total, 0);
  }

  function countAbsentDays(employeeId, monthStr){
    const today = new Date(); today.setHours(0,0,0,0);
    return data.liveSessions.filter(s => {
      if(s.employeeId !== employeeId) return false;
      if(s.date.slice(0,7) !== monthStr) return false;
      if(s.status !== "นัดหมาย") return false;
      return new Date(s.date + "T00:00:00") < today;
    }).length;
  }

  function renderPayroll(){
    const fullTimeEmployees = data.employees.filter(e => e.employmentType === "full-time");
    const tiersRows = data.commissionTiers.map((t,i) => `
      <tr>
        <td>ขั้น ${i+1}</td>
        <td><input type="number" id="tier-min-${t.id}" value="${t.minSales === null ? "" : t.minSales}" placeholder="ว่าง = ยังไม่เปิดใช้"></td>
        <td><input type="number" id="tier-max-${t.id}" value="${t.maxSales === null ? "" : t.maxSales}" placeholder="ว่าง = ไม่มีเพดาน"></td>
        <td><input type="number" id="tier-rate-${t.id}" value="${t.ratePercent}"></td>
      </tr>`).join("");
    const employeeOptions = fullTimeEmployees.map(e => `<option value="${e.id}">${e.name}</option>`).join("");
    const currentMonth = new Date().toISOString().slice(0,7);

    return `
      <div class="card">
        <h3 style="margin-top:0;">ตารางค่าคอมมิชชั่นแบบขั้นบันได</h3>
        <p class="meta" style="margin-top:-8px;margin-bottom:14px;">ขั้นไหนเว้นว่างช่อง "ยอดขายขั้นต่ำ" = ยังไม่เปิดใช้งาน ระบบจะข้ามขั้นนั้นเสมอ</p>
        <table>
          <thead><tr><th></th><th>ยอดขายขั้นต่ำ</th><th>ยอดขายสูงสุด</th><th>% ค่าคอม</th></tr></thead>
          <tbody>${tiersRows}</tbody>
        </table>
        <button class="btn" style="margin-top:14px;" onclick="saveCommissionTiers()">บันทึกตารางค่าคอม</button>
      </div>
      <div class="card">
        <h3 style="margin-top:0;">คำนวณเงินเดือน & ค่าคอม</h3>
        ${fullTimeEmployees.length === 0 ? `<p class="meta">ยังไม่มีพนักงานประจำในระบบ</p>` : `
        <div class="field"><label>เดือน</label><input type="month" id="payroll-month" value="${currentMonth}"></div>
        <div class="field"><label>พนักงาน</label><select id="payroll-employee">${employeeOptions}</select></div>
        <button class="btn" onclick="calculatePayroll()">คำนวณ</button>
        <div id="payroll-result" style="margin-top:18px;"></div>
        `}
      </div>`;
  }

  async function saveCommissionTiers(){
    const tiers = data.commissionTiers.map(t => {
      const minVal = document.getElementById(`tier-min-${t.id}`).value;
      const maxVal = document.getElementById(`tier-max-${t.id}`).value;
      const rateVal = document.getElementById(`tier-rate-${t.id}`).value;
      return {
        id: t.id,
        minSales: minVal === "" ? null : Number(minVal),
        maxSales: maxVal === "" ? null : Number(maxVal),
        ratePercent: rateVal === "" ? 0 : Number(rateVal)
      };
    });
    const { error } = await sb.rpc("rpc_save_tiers", { p_code: myCode, p_tiers: tiers });
    if(error){ showToast("บันทึกไม่สำเร็จ: " + error.message, "error"); return; }
    await refreshAllData();
    renderPage("payroll");
  }

  function calculatePayroll(){
    const employeeId = Number(document.getElementById("payroll-employee").value);
    const monthStr = document.getElementById("payroll-month").value;
    if(!monthStr){ showToast("เลือกเดือนก่อน", "error"); return; }
    const emp = getEmployeeById(employeeId);
    const totalSales = monthlySales(employeeId, monthStr);
    const tier = findMatchingTier(totalSales);
    const commission = tier ? totalSales * tier.ratePercent / 100 : 0;
    const absentDays = countAbsentDays(employeeId, monthStr);
    const deduction = Math.round((emp.baseSalary / 30) * absentDays);
    const net = emp.baseSalary + commission - deduction;
    document.getElementById("payroll-result").innerHTML = `
      <div class="grid cols-3">
        <div><div class="stat-label">ยอดขายรวมเดือนนี้</div><div class="stat-value">฿${totalSales.toLocaleString()}</div></div>
        <div><div class="stat-label">ขั้นค่าคอมที่ตรง</div><div class="stat-value" style="font-size:16px;">${tier ? tier.ratePercent + "%" : "ไม่พบขั้นที่ตรง"}</div></div>
        <div><div class="stat-label">ค่าคอม</div><div class="stat-value">฿${commission.toLocaleString()}</div></div>
      </div>
      <div class="grid cols-3" style="margin-top:16px;">
        <div><div class="stat-label">วันขาด</div><div class="stat-value">${absentDays} วัน</div></div>
        <div><div class="stat-label">เงินหัก</div><div class="stat-value" style="color:var(--danger);">-฿${deduction.toLocaleString()}</div></div>
        <div><div class="stat-label">เงินเดือนสุทธิ</div><div class="stat-value">฿${net.toLocaleString()}</div></div>
      </div>
      <div class="meta" style="margin-top:14px;">เงินเดือนฐาน ฿${emp.baseSalary.toLocaleString()} + ค่าคอม ฿${commission.toLocaleString()} − เงินหัก ฿${deduction.toLocaleString()} = สุทธิ ฿${net.toLocaleString()}</div>
      <div style="border-top:1px solid var(--border);margin-top:18px;padding-top:14px;">
        <div class="stat-label" style="margin-bottom:8px;">ข้อมูลสำหรับทำจ่าย</div>
        <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;">
          ${emp.idCardPhoto
            ? `<img src="${emp.idCardPhoto}" style="width:180px;height:112px;object-fit:cover;border-radius:8px;border:1px solid var(--border);">`
            : `<div class="meta" style="color:var(--danger);">⚠️ ยังไม่มีรูปบัตรประชาชน — เพิ่มได้ที่หน้า "จัดการพนักงาน"</div>`}
          <div class="meta">
            เลขบัตรประชาชน: ${emp.idCardNumber || "-"}<br>
            ธนาคาร: ${emp.bankName || "-"}<br>
            เลขบัญชี: ${emp.bankAccountNumber || "-"}<br>
            ชื่อบัญชี: ${emp.bankAccountName || "-"}
          </div>
        </div>
      </div>`;
  }

  // init: restore session (if any) via a fresh PIN check, otherwise show login
  (async function init(){
    const btn = document.querySelector("#login-screen button");
    const input = document.getElementById("pin-input");
    const sessionCode = sessionStorage.getItem(SESSION_KEY);
    if(sessionCode){
      btn.disabled = true; input.disabled = true; btn.textContent = "กำลังเชื่อมต่อ...";
      try {
        const me = await bootstrapWithCode(sessionCode);
        if(me){
          myCode = sessionCode;
          currentEmployee = me;
          btn.disabled = false; input.disabled = false; btn.textContent = "เข้าสู่ระบบ";
          await enterApp();
          return;
        }
      } catch(err){ /* fall through to login screen */ }
      sessionStorage.removeItem(SESSION_KEY);
      btn.disabled = false; input.disabled = false; btn.textContent = "เข้าสู่ระบบ";
    }
    input.addEventListener("keydown", e => {
      if(e.key === "Enter") attemptLogin();
    });
  })();
</script>
</body>
</html>
